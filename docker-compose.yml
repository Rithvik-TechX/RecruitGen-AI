# ──────────────────────────────────────────────────────────
# RecruitmentGen AI — Docker Compose
# ──────────────────────────────────────────────────────────

services:
  # ── PostgreSQL 16 ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: recruitgen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recruitgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruitgen_secret}
      POSTGRES_DB: ${POSTGRES_DB:-recruitgen_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruitgen} -d ${POSTGRES_DB:-recruitgen_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ChromaDB Vector Store ─────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: recruitgen-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/localhost/8000; printf 'GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── FastAPI Backend ────────────────────────────────────
  backend:
    container_name: recruitgen-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
